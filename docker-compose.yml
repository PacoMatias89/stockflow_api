services:
  postgres:
    image: postgres:17-alpine
    container_name: stockflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stockflow
      POSTGRES_USER: stockflow
      POSTGRES_PASSWORD: stockflow_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockflow -d stockflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: stockflow-postgres-data