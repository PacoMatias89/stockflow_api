spring:
  datasource:
    # Las propiedades de conexión las inyectará Testcontainers en runtime
    # mediante @ServiceConnection. No hace falta declararlas aquí.
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  tracing:
    sampling:
      probability: 0.0

logging:
  level:
    org.hibernate.SQL: WARN
    org.testcontainers: INFO
    com.github.dockerjava: WARN