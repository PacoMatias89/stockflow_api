spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/stockflow
    username: stockflow
    password: stockflow_dev_password
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      pool-name: StockflowHikariCP
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      export:
        enabled: false

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.security: DEBUG